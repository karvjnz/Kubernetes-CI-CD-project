apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator

spec:
  replicas: 1

  selector:
    matchLabels:
      app: calculator

  template:
    metadata:
      labels:
        app: calculator

    spec:
      terminationGracePeriodSeconds: 0
      
      containers:
      - name: calculator
        image: calculator:test
        imagePullPolicy: Never

        ports:
        - containerPort: 5000
        
        readinessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 2
          failureThreshold: 3

        livenessProbe:
          httpGet:
            path: /
            port: 5000
          initialDelaySeconds: 10
          periodSeconds: 10
