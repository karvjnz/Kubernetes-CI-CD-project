apiVersion: apps/v1
kind: Deployment
metadata:
  name: calculator
spec:
  replicas: 3

  selector:
    matchLabels:
      app: calculator

  template:
    metadata:
      labels:
        app: calculator

    spec:
      containers:
      - name: calculator
        image: karvjnz/calculator:test
        imagePullPolicy: Never

        ports:
        - containerPort: 5000
